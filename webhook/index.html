<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webhook panel</title>
  <link rel="shortcut icon" type="image/png" href="../images/pogger.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #beb5ff 0%, #7d7dff 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 0%, #667eea 70%, #764ba2 100%);
      opacity: 0;
      z-index: -1;
      animation: gradientPulse 6s ease-in-out infinite;
    }

    @keyframes gradientPulse {
      0%, 100% { opacity: 0; transform: scale(1.5); }
      50% { opacity: 1; transform: scale(1); }
    }

    .container {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 960px;
      align-items: flex-start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 28px;
    }

    .editor-panel {
      flex: 1;
      min-width: 0;
      max-height: 90vh;
      overflow-y: auto;
    }

    .preview-panel {
      width: 420px;
      flex-shrink: 0;
      position: sticky;
      top: 24px;
    }

    .panel h1, .panel h2 {
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder, .field textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .field input:focus, .field textarea:focus {
      border-color: rgba(255, 255, 255, 0.5);
    }

    .field textarea { resize: vertical; min-height: 70px; }

    .avatar-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .avatar-preview img {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.3);
      display: none;
    }

    .avatar-preview span {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 18px 0;
    }

    /* Embed Editor */
    .embed-editor {
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.05);
    }

    .embed-editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .embed-editor-header span {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      font-weight: 500;
    }

    /* Sections */
    .section {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-weight: 500;
      user-select: none;
      transition: background 0.15s;
    }

    .section-header:hover { background: rgba(255, 255, 255, 0.05); }

    .section-header .chevron {
      transition: transform 0.2s;
      font-size: 13px;
    }

    .section.open .section-header .chevron { transform: rotate(90deg); }

    .section-body {
      display: none;
      padding: 0 12px 12px;
    }

    .section.open .section-body { display: block; }

    /* Field Editor */
    .field-editor {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
    }

    .field-editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .field-editor-header span {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }

    .inline-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
    }

    .inline-toggle input { width: auto; }

    /* Color */
    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-row input[type="checkbox"] { width: auto; }

    .color-row input[type="color"] {
      width: 36px; height: 30px;
      padding: 2px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .color-hex {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-family: monospace;
    }

    /* Buttons */
    .remove-btn {
      background: rgba(251, 113, 133, 0.25);
      border: 1px solid rgba(251, 113, 133, 0.35);
      color: #fb7185;
      border-radius: 6px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .remove-btn:hover { background: rgba(251, 113, 133, 0.4); }

    .add-btn, .add-embed-btn {
      width: 100%;
      padding: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
    }

    .add-embed-btn { margin-bottom: 16px; padding: 10px; }

    .add-btn:hover, .add-embed-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .send-btn {
      width: 100%;
      padding: 12px;
      background: rgba(88, 101, 242, 0.8);
      border: 1px solid rgba(88, 101, 242, 0.6);
      border-radius: 8px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover { background: rgba(88, 101, 242, 1); transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
    }

    .status.success { color: #a3e635; }
    .status.error { color: #fb7185; }

    /* JSON Editor */
    .json-section { margin-top: 12px; }

    .json-toggle {
      width: 100%;
      padding: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
    }

    .json-toggle:hover { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.8); }

    #jsonEditor {
      width: 100%;
      min-height: 200px;
      margin-top: 8px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #a3e635;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      resize: vertical;
      outline: none;
    }

    .json-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .json-actions button {
      flex: 1;
      padding: 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      transition: all 0.2s;
    }

    .json-actions button:hover { background: rgba(255, 255, 255, 0.15); color: white; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .back-link:hover { color: rgba(255, 255, 255, 0.8); }

    /* Discord Preview */
    .discord-preview {
      background: #313338;
      border-radius: 8px;
      padding: 16px 16px 16px 72px;
      position: relative;
      font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 60px;
      overflow-x: hidden;
    }

    .discord-avatar {
      position: absolute;
      left: 16px; top: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .discord-avatar-default {
      position: absolute;
      left: 16px; top: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .discord-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .discord-username {
      color: white;
      font-weight: 500;
      font-size: 16px;
    }

    .discord-bot-badge {
      background: #5865f2;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 4px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .discord-timestamp {
      color: #949ba4;
      font-size: 12px;
    }

    .discord-text {
      color: #dbdee1;
      font-size: 16px;
      line-height: 1.375;
      word-wrap: break-word;
    }

    .discord-embed {
      max-width: 516px;
      border-radius: 4px;
      border-left: 4px solid #1e1f22;
      background: #2b2d31;
      margin-top: 4px;
      display: inline-block;
    }

    .discord-embed-inner {
      display: flex;
      padding: 8px 16px 8px 12px;
    }

    .discord-embed-content {
      flex: 1;
      min-width: 0;
    }

    .discord-embed-author {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .discord-embed-author-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .discord-embed-author-name {
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .discord-embed-author-name a {
      color: white;
      text-decoration: none;
    }

    .discord-embed-author-name a:hover { text-decoration: underline; }

    .discord-embed-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .discord-embed-title a {
      color: #00aff4;
      text-decoration: none;
    }

    .discord-embed-title a:hover { text-decoration: underline; }

    .discord-embed-description {
      color: #dbdee1;
      font-size: 14px;
      line-height: 1.375;
      word-wrap: break-word;
    }

    .discord-embed-fields {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .discord-embed-field { grid-column: 1 / -1; min-width: 0; }
    .discord-embed-field.inline { grid-column: auto; }

    .discord-embed-field-name {
      color: white;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .discord-embed-field-value {
      color: #dbdee1;
      font-size: 14px;
      line-height: 1.375;
      word-wrap: break-word;
    }

    .discord-embed-image img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 4px;
      margin-top: 8px;
      display: block;
    }

    .discord-embed-thumbnail {
      margin-left: 16px;
      flex-shrink: 0;
    }

    .discord-embed-thumbnail img {
      width: 80px; height: 80px;
      border-radius: 4px;
      object-fit: cover;
    }

    .discord-embed-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px 8px;
      color: #949ba4;
      font-size: 12px;
    }

    .discord-embed-footer-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* Scrollbar */
    .editor-panel::-webkit-scrollbar { width: 6px; }
    .editor-panel::-webkit-scrollbar-track { background: transparent; }
    .editor-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .container { flex-direction: column; }
      .preview-panel { width: 100%; position: static; }
      .editor-panel { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel editor-panel">
      <h1>webhook panel</h1>

      <div class="field">
        <label>webhook url</label>
        <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
      </div>

      <div class="field">
        <label>username</label>
        <input type="text" id="username" placeholder="Custom bot name">
      </div>

      <div class="field">
        <label>avatar url</label>
        <input type="text" id="avatarUrl" placeholder="https://example.com/avatar.png">
        <div class="avatar-preview">
          <img id="avatarPreview" src="" alt="avatar">
          <span id="avatarStatus"></span>
        </div>
      </div>

      <div class="field">
        <label>message</label>
        <textarea id="content" placeholder="message content..."></textarea>
      </div>

      <div class="divider"></div>

      <div id="embedEditors"></div>

      <button class="add-embed-btn" onclick="addEmbed()">+ add embed</button>

      <button class="send-btn" id="sendBtn" onclick="send()">Send Message</button>
      <div class="status" id="status"></div>

      <div class="json-section">
        <button class="json-toggle" onclick="toggleJson()">json editor</button>
        <div id="jsonSection" style="display:none">
          <textarea id="jsonEditor" spellcheck="false"></textarea>
          <div class="json-actions">
            <button onclick="applyJson()">apply</button>
            <button onclick="copyJson()">copy</button>
          </div>
        </div>
      </div>

      <a href="/" class="back-link">back to fishpog.lol</a>
    </div>

    <div class="panel preview-panel">
      <h2>preview</h2>
      <div class="discord-preview" id="preview"></div>
    </div>
  </div>

  <script>
    const state = { webhookUrl: '', username: '', avatarUrl: '', content: '', embeds: [] };
    const $ = id => document.getElementById(id);

    function escAttr(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escHtml(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderMd(text) {
      if (!text) return '';
      let h = escHtml(text);
      h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
      h = h.replace(/__(.+?)__/g, '<u>$1</u>');
      h = h.replace(/~~(.+?)~~/g, '<s>$1</s>');
      h = h.replace(/`(.+?)`/g, '<code style="background:#1e1f22;padding:2px 4px;border-radius:3px;font-size:85%">$1</code>');
      h = h.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:#00aff4;text-decoration:none">$1</a>');
      h = h.replace(/\n/g, '<br>');
      return h;
    }

    function createEmbed() {
      return {
        author: { name: '', url: '', icon_url: '' },
        title: '', url: '', description: '',
        color: null,
        fields: [],
        thumbnail: '', image: '',
        footer: { text: '', icon_url: '' },
        timestamp: ''
      };
    }

    function saveState() {
      localStorage.setItem('webhookState', JSON.stringify(state));
    }

    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem('webhookState'));
        if (!s) return;
        state.webhookUrl = s.webhookUrl || '';
        state.username = s.username || '';
        state.avatarUrl = s.avatarUrl || '';
        state.content = s.content || '';
        state.embeds = (s.embeds || []).map(e => ({
          author: { name: e.author?.name || '', url: e.author?.url || '', icon_url: e.author?.icon_url || '' },
          title: e.title || '', url: e.url || '', description: e.description || '',
          color: e.color ?? null,
          fields: (e.fields || []).map(f => ({ name: f.name || '', value: f.value || '', inline: !!f.inline })),
          thumbnail: e.thumbnail || '', image: e.image || '',
          footer: { text: e.footer?.text || '', icon_url: e.footer?.icon_url || '' },
          timestamp: e.timestamp || ''
        }));
      } catch(e) {}
    }

    function updateEmbed(i, path, value) {
      const parts = path.split('.');
      let obj = state.embeds[i];
      for (let p = 0; p < parts.length - 1; p++) obj = obj[parts[p]];
      obj[parts[parts.length - 1]] = value;
      saveState();
      renderPreview();
      updateJsonIfOpen();
    }

    function updateField(ei, fi, key, value) {
      state.embeds[ei].fields[fi][key] = value;
      saveState();
      renderPreview();
      updateJsonIfOpen();
    }

    function toggleColor(i, enabled) {
      state.embeds[i].color = enabled ? parseInt($('color-' + i).value.slice(1), 16) : null;
      saveState();
      renderPreview();
      updateJsonIfOpen();
    }

    function updateColor(i, hex) {
      if ($('colorEnabled-' + i).checked) {
        state.embeds[i].color = parseInt(hex.slice(1), 16);
        saveState();
        renderPreview();
        updateJsonIfOpen();
      }
    }

    function addEmbed() {
      if (state.embeds.length >= 10) return showStatus('max 10 embeds', 'error');
      state.embeds.push(createEmbed());
      saveState();
      renderEmbedEditors();
      renderPreview();
    }

    function removeEmbed(i) {
      state.embeds.splice(i, 1);
      saveState();
      renderEmbedEditors();
      renderPreview();
    }

    function addField(ei) {
      if (state.embeds[ei].fields.length >= 25) return showStatus('max 25 fields', 'error');
      state.embeds[ei].fields.push({ name: '', value: '', inline: false });
      saveState();
      renderEmbedEditors();
      renderPreview();
    }

    function removeField(ei, fi) {
      state.embeds[ei].fields.splice(fi, 1);
      saveState();
      renderEmbedEditors();
      renderPreview();
    }

    function renderEmbedEditors() {
      $('embedEditors').innerHTML = state.embeds.map((e, i) => genEmbedEditor(e, i)).join('');
    }

    function genEmbedEditor(embed, i) {
      const cc = embed.color !== null ? 'checked' : '';
      const ch = embed.color !== null ? '#' + embed.color.toString(16).padStart(6, '0') : '#5865f2';
      const fl = embed.fields.map((f, fi) => genFieldEditor(f, i, fi)).join('');

      return `<div class="embed-editor">
        <div class="embed-editor-header">
          <span>embed ${i + 1}</span>
          <button class="remove-btn" onclick="removeEmbed(${i})">&#215;</button>
        </div>

        <div class="section open">
          <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
            <span>body</span><span class="chevron">&#8250;</span>
          </div>
          <div class="section-body">
            <div class="field"><label>title</label>
              <input type="text" value="${escAttr(embed.title)}" oninput="updateEmbed(${i},'title',this.value)" placeholder="embed title"></div>
            <div class="field"><label>title url</label>
              <input type="text" value="${escAttr(embed.url)}" oninput="updateEmbed(${i},'url',this.value)" placeholder="https://..."></div>
            <div class="field"><label>description</label>
              <textarea oninput="updateEmbed(${i},'description',this.value)" placeholder="embed description..." rows="3">${escHtml(embed.description)}</textarea></div>
            <div class="field"><label>color</label>
              <div class="color-row">
                <input type="checkbox" id="colorEnabled-${i}" ${cc} onchange="toggleColor(${i},this.checked)">
                <input type="color" id="color-${i}" value="${ch}" oninput="updateColor(${i},this.value)">
                <span class="color-hex">${cc ? ch : 'none'}</span>
              </div></div>
          </div>
        </div>

        <div class="section">
          <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
            <span>author</span><span class="chevron">&#8250;</span>
          </div>
          <div class="section-body">
            <div class="field"><label>name</label>
              <input type="text" value="${escAttr(embed.author.name)}" oninput="updateEmbed(${i},'author.name',this.value)"></div>
            <div class="field"><label>url</label>
              <input type="text" value="${escAttr(embed.author.url)}" oninput="updateEmbed(${i},'author.url',this.value)" placeholder="https://..."></div>
            <div class="field"><label>icon url</label>
              <input type="text" value="${escAttr(embed.author.icon_url)}" oninput="updateEmbed(${i},'author.icon_url',this.value)" placeholder="https://..."></div>
          </div>
        </div>

        <div class="section${embed.fields.length > 0 ? ' open' : ''}">
          <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
            <span>fields${embed.fields.length > 0 ? ' (' + embed.fields.length + ')' : ''}</span><span class="chevron">&#8250;</span>
          </div>
          <div class="section-body">
            ${fl}
            <button class="add-btn" onclick="addField(${i})">+ add field</button>
          </div>
        </div>

        <div class="section">
          <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
            <span>images</span><span class="chevron">&#8250;</span>
          </div>
          <div class="section-body">
            <div class="field"><label>thumbnail url</label>
              <input type="text" value="${escAttr(embed.thumbnail)}" oninput="updateEmbed(${i},'thumbnail',this.value)" placeholder="https://... (small, top-right)"></div>
            <div class="field"><label>image url</label>
              <input type="text" value="${escAttr(embed.image)}" oninput="updateEmbed(${i},'image',this.value)" placeholder="https://... (large, bottom)"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
            <span>footer</span><span class="chevron">&#8250;</span>
          </div>
          <div class="section-body">
            <div class="field"><label>text</label>
              <input type="text" value="${escAttr(embed.footer.text)}" oninput="updateEmbed(${i},'footer.text',this.value)"></div>
            <div class="field"><label>icon url</label>
              <input type="text" value="${escAttr(embed.footer.icon_url)}" oninput="updateEmbed(${i},'footer.icon_url',this.value)" placeholder="https://..."></div>
            <div class="field"><label>timestamp</label>
              <input type="datetime-local" value="${escAttr(embed.timestamp)}" oninput="updateEmbed(${i},'timestamp',this.value)"></div>
          </div>
        </div>
      </div>`;
    }

    function genFieldEditor(field, ei, fi) {
      return `<div class="field-editor">
        <div class="field-editor-header">
          <span>field ${fi + 1}</span>
          <button class="remove-btn" onclick="removeField(${ei},${fi})">&#215;</button>
        </div>
        <div class="field"><label>name</label>
          <input type="text" value="${escAttr(field.name)}" oninput="updateField(${ei},${fi},'name',this.value)"></div>
        <div class="field"><label>value</label>
          <textarea oninput="updateField(${ei},${fi},'value',this.value)" rows="2">${escHtml(field.value)}</textarea></div>
        <label class="inline-toggle">
          <input type="checkbox" ${field.inline ? 'checked' : ''} onchange="updateField(${ei},${fi},'inline',this.checked)">
          <span>inline</span>
        </label>
      </div>`;
    }

    function renderPreview() {
      const name = state.username || 'Webhook';
      const now = new Date();
      const time = 'Today at ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const avatar = state.avatarUrl
        ? `<img class="discord-avatar" src="${escAttr(state.avatarUrl)}" onerror="this.style.display='none'">`
        : `<div class="discord-avatar-default"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>`;

      const contentHtml = state.content ? `<div class="discord-text">${renderMd(state.content)}</div>` : '';

      let embedsHtml = '';
      for (const embed of state.embeds) {
        const has = embed.author.name || embed.title || embed.description ||
                    embed.fields.length > 0 || embed.image || embed.thumbnail ||
                    embed.footer.text || embed.color !== null;
        if (!has) continue;

        const bc = embed.color !== null ? '#' + embed.color.toString(16).padStart(6, '0') : '#1e1f22';

        let author = '';
        if (embed.author.name) {
          const icon = embed.author.icon_url ? `<img class="discord-embed-author-icon" src="${escAttr(embed.author.icon_url)}" onerror="this.style.display='none'">` : '';
          const nm = embed.author.url
            ? `<a href="${escAttr(embed.author.url)}" target="_blank">${escHtml(embed.author.name)}</a>`
            : escHtml(embed.author.name);
          author = `<div class="discord-embed-author">${icon}<span class="discord-embed-author-name">${nm}</span></div>`;
        }

        let title = '';
        if (embed.title) {
          const t = embed.url
            ? `<a href="${escAttr(embed.url)}" target="_blank">${escHtml(embed.title)}</a>`
            : `<span style="color:white">${escHtml(embed.title)}</span>`;
          title = `<div class="discord-embed-title">${t}</div>`;
        }

        const desc = embed.description ? `<div class="discord-embed-description">${renderMd(embed.description)}</div>` : '';

        let fields = '';
        if (embed.fields.length > 0) {
          const items = embed.fields.map(f => {
            const cls = f.inline ? ' inline' : '';
            return `<div class="discord-embed-field${cls}">
              <div class="discord-embed-field-name">${escHtml(f.name || '\u200b')}</div>
              <div class="discord-embed-field-value">${renderMd(f.value || '\u200b')}</div>
            </div>`;
          }).join('');
          fields = `<div class="discord-embed-fields">${items}</div>`;
        }

        const image = embed.image ? `<div class="discord-embed-image"><img src="${escAttr(embed.image)}" onerror="this.style.display='none'"></div>` : '';
        const thumb = embed.thumbnail ? `<div class="discord-embed-thumbnail"><img src="${escAttr(embed.thumbnail)}" onerror="this.style.display='none'"></div>` : '';

        let footer = '';
        if (embed.footer.text || embed.timestamp) {
          const fi = embed.footer.icon_url ? `<img class="discord-embed-footer-icon" src="${escAttr(embed.footer.icon_url)}" onerror="this.style.display='none'">` : '';
          const ft = escHtml(embed.footer.text);
          const sep = embed.footer.text && embed.timestamp ? ' <span style="margin:0 4px">&#8226;</span> ' : '';
          let ts = '';
          if (embed.timestamp) {
            try { ts = new Date(embed.timestamp).toLocaleDateString(undefined, { month: '2-digit', day: '2-digit', year: 'numeric' }); }
            catch(e) { ts = embed.timestamp; }
          }
          footer = `<div class="discord-embed-footer">${fi}${ft}${sep}${ts}</div>`;
        }

        embedsHtml += `<div class="discord-embed" style="border-left-color:${bc}">
          <div class="discord-embed-inner">
            <div class="discord-embed-content">${author}${title}${desc}${fields}${image}</div>
            ${thumb}
          </div>
          ${footer}
        </div>`;
      }

      $('preview').innerHTML = `${avatar}
        <div class="discord-message-content">
          <div class="discord-header">
            <span class="discord-username">${escHtml(name)}</span>
            <span class="discord-bot-badge">BOT</span>
            <span class="discord-timestamp">${time}</span>
          </div>
          ${contentHtml}
          ${embedsHtml}
        </div>`;
    }

    function buildPayload() {
      const p = {};
      if (state.content) p.content = state.content;
      if (state.username) p.username = state.username;
      if (state.avatarUrl) p.avatar_url = state.avatarUrl;

      const embeds = [];
      for (const embed of state.embeds) {
        const e = {};
        if (embed.author.name) {
          e.author = { name: embed.author.name };
          if (embed.author.url) e.author.url = embed.author.url;
          if (embed.author.icon_url) e.author.icon_url = embed.author.icon_url;
        }
        if (embed.title) e.title = embed.title;
        if (embed.url && embed.title) e.url = embed.url;
        if (embed.description) e.description = embed.description;
        if (embed.color !== null) e.color = embed.color;
        if (embed.fields.length > 0) {
          const f = embed.fields.filter(x => x.name || x.value).map(x => ({
            name: x.name || '\u200b', value: x.value || '\u200b', inline: x.inline
          }));
          if (f.length > 0) e.fields = f;
        }
        if (embed.thumbnail) e.thumbnail = { url: embed.thumbnail };
        if (embed.image) e.image = { url: embed.image };
        if (embed.footer.text) {
          e.footer = { text: embed.footer.text };
          if (embed.footer.icon_url) e.footer.icon_url = embed.footer.icon_url;
        }
        if (embed.timestamp) {
          try { e.timestamp = new Date(embed.timestamp).toISOString(); } catch(err) {}
        }
        if (Object.keys(e).length > 0) embeds.push(e);
      }
      if (embeds.length > 0) p.embeds = embeds;
      return p;
    }

    async function send() {
      const url = state.webhookUrl.trim();
      if (!url) return showStatus('enter a webhook url', 'error');
      const payload = buildPayload();
      if (!payload.content && !payload.embeds) return showStatus('add a message or embed', 'error');

      const btn = $('sendBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok || res.status === 204) {
          showStatus('message sent', 'success');
        } else {
          const data = await res.json().catch(() => ({}));
          showStatus(data.message || 'error ' + res.status, 'error');
        }
      } catch(e) {
        showStatus('failed to send \u2014 check the webhook url', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Send Message';
    }

    function toggleJson() {
      const s = $('jsonSection');
      const vis = s.style.display !== 'none';
      s.style.display = vis ? 'none' : 'block';
      if (!vis) $('jsonEditor').value = JSON.stringify(buildPayload(), null, 2);
    }

    function updateJsonIfOpen() {
      const s = $('jsonSection');
      if (s.style.display !== 'none') {
        $('jsonEditor').value = JSON.stringify(buildPayload(), null, 2);
      }
    }

    function applyJson() {
      try {
        const p = JSON.parse($('jsonEditor').value);
        state.content = p.content || '';
        state.username = p.username || '';
        state.avatarUrl = p.avatar_url || '';
        state.embeds = (p.embeds || []).map(e => ({
          author: { name: e.author?.name || '', url: e.author?.url || '', icon_url: e.author?.icon_url || '' },
          title: e.title || '', url: e.url || '', description: e.description || '',
          color: e.color ?? null,
          fields: (e.fields || []).map(f => ({ name: f.name || '', value: f.value || '', inline: !!f.inline })),
          thumbnail: typeof e.thumbnail === 'string' ? e.thumbnail : (e.thumbnail?.url || ''),
          image: typeof e.image === 'string' ? e.image : (e.image?.url || ''),
          footer: { text: e.footer?.text || '', icon_url: e.footer?.icon_url || '' },
          timestamp: e.timestamp ? e.timestamp.slice(0, 16) : ''
        }));
        $('webhookUrl').value = state.webhookUrl;
        $('username').value = state.username;
        $('avatarUrl').value = state.avatarUrl;
        $('content').value = state.content;
        updateAvatarPreview();
        renderEmbedEditors();
        renderPreview();
        saveState();
        showStatus('json applied', 'success');
      } catch(e) {
        showStatus('invalid json', 'error');
      }
    }

    function copyJson() {
      const json = JSON.stringify(buildPayload(), null, 2);
      navigator.clipboard.writeText(json).then(() => showStatus('copied', 'success'))
        .catch(() => { $('jsonEditor').select(); document.execCommand('copy'); showStatus('copied', 'success'); });
    }

    function updateAvatarPreview() {
      const url = state.avatarUrl.trim();
      const img = $('avatarPreview');
      const st = $('avatarStatus');
      if (!url) { img.style.display = 'none'; st.textContent = ''; return; }
      const t = new Image();
      t.onload = () => { img.src = url; img.style.display = 'block'; st.textContent = ''; };
      t.onerror = () => { img.style.display = 'none'; st.textContent = 'could not load image'; };
      t.src = url;
    }

    function showStatus(text, type) {
      const el = $('status');
      el.textContent = text;
      el.className = 'status ' + type;
      setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 4000);
    }

    (function init() {
      loadState();
      $('webhookUrl').value = state.webhookUrl;
      $('username').value = state.username;
      $('avatarUrl').value = state.avatarUrl;
      $('content').value = state.content;

      $('webhookUrl').addEventListener('input', function() { state.webhookUrl = this.value; saveState(); });
      $('username').addEventListener('input', function() { state.username = this.value; saveState(); renderPreview(); });
      $('avatarUrl').addEventListener('input', function() { state.avatarUrl = this.value; saveState(); renderPreview(); updateAvatarPreview(); });
      $('content').addEventListener('input', function() { state.content = this.value; saveState(); renderPreview(); updateJsonIfOpen(); });

      updateAvatarPreview();
      renderEmbedEditors();
      renderPreview();
    })();
  </script>
</body>
</html>
