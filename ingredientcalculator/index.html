<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Ingredient Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:2rem;margin:20px 0 5px;color:#5dade2;text-shadow:0 0 20px rgba(93,173,226,.3)}
.subtitle{color:#888;margin-bottom:30px;font-size:.9rem}
.card{background:#16213e;border-radius:12px;padding:30px;max-width:600px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.3);border:1px solid #1a3a5c}
.input-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;font-size:1.1rem}
.input-row label{color:#aaa}
.qty-group{display:flex;align-items:center;gap:6px}
input[type=number]{width:70px;padding:8px 10px;border-radius:8px;border:2px solid #2a4a6c;background:#0f1a2e;color:#fff;font-size:1rem;text-align:center}
input[type=number]:focus{border-color:#5dade2;outline:none;box-shadow:0 0 10px rgba(93,173,226,.2)}
.search-wrap{position:relative;flex:1;min-width:200px}
#itemSearch{width:100%;padding:8px 12px;border-radius:8px;border:2px solid #2a4a6c;background:#0f1a2e;color:#fff;font-size:1rem}
#itemSearch:focus{border-color:#5dade2;outline:none;box-shadow:0 0 10px rgba(93,173,226,.2)}
.dropdown{position:absolute;top:100%;left:0;right:0;background:#0f1a2e;border:2px solid #2a4a6c;border-top:none;border-radius:0 0 8px 8px;max-height:250px;overflow-y:auto;display:none;z-index:100}
.dropdown.show{display:block}
.dropdown-item{padding:8px 12px;cursor:pointer;font-size:.95rem}
.dropdown-item:hover,.dropdown-item.active{background:#1a3a5c;color:#5dade2}
.dropdown-item .cat{color:#666;font-size:.75rem;margin-left:6px}
#calcBtn{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;border:none;padding:10px 25px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;transition:all .15s}
#calcBtn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(46,204,113,.3)}
#calcBtn:active{transform:translateY(0)}
.results{margin-top:20px}
.results h2{font-size:1.1rem;color:#5dade2;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a3a5c}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;border-radius:8px;margin-bottom:6px;background:#0f1a2e;border:1px solid #1a3a5c}
.result-item .name{font-weight:500}
.result-item .amount{color:#2ecc71;font-weight:700;font-size:1.1rem}
.result-item .stacks{color:#888;font-size:.85rem;margin-left:8px}
.breakdown{margin-top:15px}
.breakdown h3{font-size:.95rem;color:#888;margin-bottom:8px;cursor:pointer;user-select:none}
.breakdown h3:hover{color:#aaa}
.step{padding:6px 12px;font-size:.85rem;color:#999;border-left:2px solid #1a3a5c;margin-bottom:4px;margin-left:10px}
.error{color:#e74c3c;padding:10px;text-align:center}
.total-label{color:#aaa;font-size:.85rem;margin-top:2px}
#totalItems{color:#5dade2;font-weight:600}
.tag{display:inline-block;background:#1a3a5c;color:#5dade2;padding:2px 8px;border-radius:4px;font-size:.75rem;margin-left:8px}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0f1a2e}
::-webkit-scrollbar-thumb{background:#2a4a6c;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a5a8c}
</style>
</head>
<body>
<h1>Ingredient Calculator</h1>
<p class="subtitle">Minecraft crafting recipe breakdown</p>
<div class="card">
  <div class="input-row">
    <label>I need</label>
    <div class="qty-group">
      <input type="number" id="stacks" min="0" value="0" placeholder="0">
      <label>stacks +</label>
      <input type="number" id="extra" min="0" value="0" placeholder="0">
      <label>extra</label>
    </div>
  </div>
  <div class="total-label">Total: <span id="totalItems">0</span> items</div>
  <div class="input-row" style="margin-top:12px">
    <div class="search-wrap">
      <input type="text" id="itemSearch" placeholder="Search for an item..." autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
    <button id="calcBtn">Calculate</button>
  </div>
  <div class="results" id="results"></div>
</div>
<script src="recipes.js"></script>
<script src="app.js"></script>
</body>
</html>
