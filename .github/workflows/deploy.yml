name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yourhorizon/package-lock.json

      # Build the Next.js app
      - name: Install dependencies
        run: npm ci
        working-directory: yourhorizon

      - name: Build Next.js
        run: npm run build
        working-directory: yourhorizon
        env:
          NEXT_PUBLIC_API_URL: https://fishpog-lol.onrender.com

      # Assemble the full site:
      # 1. Copy everything EXCEPT yourhorizon source to _site
      # 2. Copy the Next.js build output into _site/yourhorizon
      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy all root-level site files (excluding yourhorizon source and dot-dirs)
          for item in *; do
            if [ "$item" != "yourhorizon" ] && [ "$item" != "_site" ]; then
              cp -r "$item" _site/
            fi
          done
          # Copy the built Next.js output
          cp -r yourhorizon/out _site/yourhorizon
          # Disable Jekyll
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
