<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../images/pogger.png">
    <title>scramble</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #1a1a2e;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
}

canvas {
    border: 2px solid #333;
    border-radius: 8px;
    cursor: crosshair;
    image-rendering: pixelated;
}

#ui {
    margin-top: 14px;
    text-align: center;
    user-select: none;
}

#tagline { font-size: 0.95rem; color: #888; margin-bottom: 8px; }
#input {
    background: #111;
    border: 1px solid #444;
    border-radius: 4px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    padding: 6px 12px;
    outline: none;
    text-align: center;
    width: 260px;
}
#input:focus { border-color: #7d7dff; }
#input::placeholder { color: #555; }

#msg {
    margin-top: 8px;
    font-size: 0.85rem;
    min-height: 1.2em;
}

.wrong { color: #ff6b6b; }
.right { color: #69db7c; }

#reveal {
    display: none;
    text-align: center;
    animation: fadeUp 1.8s ease forwards;
}

#reveal p {
    font-size: 1.4rem;
    line-height: 1.8;
    color: #ccc;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<canvas id="c" width="480" height="360"></canvas>

<div id="ui">
    <div id="tagline">have fun unscrambling!</div>
    <input id="input" type="text" placeholder="type here..." autocomplete="off" spellcheck="false">
    <div id="msg"></div>
</div>

<div id="reveal">
    <p>nice work! you just wasted a lot of your time. april fools &lt;3</p>
</div>

<script type="module">
import { prepareWithSegments, layoutWithLines } from 'https://esm.sh/@chenglou/pretext'

const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const input = document.getElementById('input')
const msgEl = document.getElementById('msg')
const uiEl = document.getElementById('ui')
const revealEl = document.getElementById('reveal')

// words to unscramble - intentionally dumb
const words = ['penguin', 'spaghetti', 'trampoline', 'cucumber', 'fishpog', 'giraffe', 'microwave']
const totalRounds = words.length
let currentRound = 0
let currentWord = ''
let scrambled = ''
let letters = [] // {char, x, y, vx, vy, size, hue, angle, va}
let solved = false
let solveTime = 0

function scrambleWord(w) {
    let arr = w.split('')
    for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]]
    }
    let result = arr.join('')
    // dont let it accidentally be the answer
    if (result === w) return scrambleWord(w)
    return result
}

function setupRound() {
    currentWord = words[currentRound]
    scrambled = scrambleWord(currentWord)
    input.value = ''
    msgEl.textContent = ''
    msgEl.className = ''
    solved = false

    // make bouncing letters using pretext to measure em
    letters = []
    const font = 'bold 32px Nunito'
    for (let i = 0; i < scrambled.length; i++) {
        const ch = scrambled[i]
        const prepared = prepareWithSegments(ch, font)
        const { lines } = layoutWithLines(prepared, 999, 40)
        const w = lines.length > 0 ? lines[0].width : 20

        letters.push({
            char: ch,
            x: 40 + Math.random() * (canvas.width - 80),
            y: 40 + Math.random() * (canvas.height - 80),
            vx: (Math.random() - 0.5) * 2.5,
            vy: (Math.random() - 0.5) * 2.5,
            w: w,
            size: 28 + Math.random() * 12,
            hue: Math.floor(Math.random() * 360),
            angle: (Math.random() - 0.5) * 0.6,
            va: (Math.random() - 0.5) * 0.02
        })
    }
    input.focus()
}

function drawLetter(l, t) {
    ctx.save()
    ctx.translate(l.x, l.y)
    ctx.rotate(l.angle)

    // wobbly shadow
    const wobble = Math.sin(t * 0.003 + l.hue) * 3
    ctx.shadowColor = `hsla(${l.hue}, 60%, 50%, 0.4)`
    ctx.shadowBlur = 12 + wobble

    ctx.font = `bold ${l.size}px Nunito`
    ctx.fillStyle = `hsl(${l.hue}, 70%, 70%)`
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText(l.char, 0, 0)

    ctx.shadowBlur = 0
    ctx.restore()
}

function update() {
    for (const l of letters) {
        l.x += l.vx
        l.y += l.vy
        l.angle += l.va

        if (l.x < 20 || l.x > canvas.width - 20) { l.vx *= -1; l.x = Math.max(20, Math.min(canvas.width - 20, l.x)) }
        if (l.y < 20 || l.y > canvas.height - 20) { l.vy *= -1; l.y = Math.max(20, Math.min(canvas.height - 20, l.y)) }
    }
}

function drawSolvedText(t) {
    const elapsed = t - solveTime
    const alpha = Math.min(1, elapsed / 600)

    // use pretext to lay out the solved word centered
    const font = 'bold 48px Nunito'
    const prepared = prepareWithSegments(currentWord, font)
    const { lines } = layoutWithLines(prepared, canvas.width, 56)

    ctx.save()
    ctx.globalAlpha = alpha
    ctx.font = font
    ctx.fillStyle = '#69db7c'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'

    const scale = 1 + Math.sin(elapsed * 0.005) * 0.03
    ctx.translate(canvas.width / 2, canvas.height / 2)
    ctx.scale(scale, scale)
    ctx.fillText(currentWord, 0, 0)
    ctx.restore()
}

let raf
function loop(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height)

    // subtle grid bg
    ctx.strokeStyle = '#222'
    ctx.lineWidth = 0.5
    for (let x = 0; x < canvas.width; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke() }
    for (let y = 0; y < canvas.height; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke() }

    if (solved) {
        drawSolvedText(t)
        if (t - solveTime > 1200) {
            currentRound++
            if (currentRound >= totalRounds) {
                gameOver()
                return
            }
            setupRound()
        }
    } else {
        update()
        for (const l of letters) drawLetter(l, t)
    }

    raf = requestAnimationFrame(loop)
}

function gameOver() {
    cancelAnimationFrame(raf)
    canvas.style.display = 'none'
    uiEl.style.display = 'none'
    revealEl.style.display = 'block'
}

input.addEventListener('input', () => {
    if (solved) return
    const val = input.value.toLowerCase().trim()
    if (val === currentWord) {
        solved = true
        solveTime = performance.now()
        msgEl.textContent = 'yep'
        msgEl.className = 'right'
        input.disabled = true
        setTimeout(() => { input.disabled = false }, 1100)
    } else if (val.length >= currentWord.length && val !== currentWord) {
        msgEl.textContent = 'nope'
        msgEl.className = 'wrong'
    } else {
        msgEl.textContent = ''
        msgEl.className = ''
    }
})

// prevent form submission on enter
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') e.preventDefault()
})

setupRound()
requestAnimationFrame(loop)
</script>

</body>
</html>
